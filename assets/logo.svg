<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" width="260" height="72">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26A9E0"/>
      <stop offset="100%" stop-color="#8BC53F"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26A9E0"/>
      <stop offset="100%" stop-color="#259ACC"/>
    </linearGradient>
  </defs>

  <!-- ── Book icon mark ────────────────────────────── -->
  <!-- Left page -->
  <path d="M8 18 C8 16 10 14 12 14 L28 14 L28 52 L12 52 C10 52 8 50 8 48 Z"
        fill="url(#bookGrad)"/>
  <!-- Spine -->
  <rect x="28" y="14" width="2.5" height="38" fill="#1a8ab8"/>
  <!-- Right page -->
  <path d="M30.5 14 L46 14 C48 14 50 16 50 18 L50 48 C50 50 48 52 46 52 L30.5 52 Z"
        fill="#26A9E0" opacity="0.55"/>
  <!-- Page lines – left -->
  <line x1="13" y1="22" x2="26" y2="22" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
  <line x1="13" y1="27" x2="26" y2="27" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
  <line x1="13" y1="32" x2="26" y2="32" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
  <line x1="13" y1="37" x2="22" y2="37" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
  <!-- Page lines – right -->
  <line x1="33" y1="22" x2="47" y2="22" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
  <line x1="33" y1="27" x2="47" y2="27" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
  <line x1="33" y1="32" x2="47" y2="32" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
  <line x1="33" y1="37" x2="43" y2="37" stroke="#fff" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
  <!-- Growth arrow – MOHI Green -->
  <path d="M29.25 13 L29.25 6" stroke="#8BC53F" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M25 10 L29.25 6 L33.5 10" fill="none" stroke="#8BC53F" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Text block ─────────────────────────────────── -->
  <!-- "MOHI" in MOHI Navy -->
  <text x="62" y="28"
        font-family="'Barlow','Arial Black',sans-serif"
        font-size="18" font-weight="800" letter-spacing="0.05em"
        fill="#002F66">MOHI</text>

  <!-- Thin blue rule between org name and dept -->
  <rect x="62" y="33" width="155" height="1.5" rx="1" fill="#26A9E0" opacity="0.4"/>

  <!-- "LEARNING &amp; DEVELOPMENT" -->
  <text x="62" y="46"
        font-family="'Barlow',Arial,sans-serif"
        font-size="10.5" font-weight="700" letter-spacing="0.1em"
        fill="#26A9E0">LEARNING &amp; DEVELOPMENT</text>

  <!-- "Tech &amp; Data Hub" tagline -->
  <text x="62" y="59"
        font-family="'Roboto',Arial,sans-serif"
        font-size="8" font-weight="400" letter-spacing="0.04em"
        fill="#7aaac8">Tech &amp; Data Hub</text>

  <!-- Bottom gradient bar — blue→green brand gradient -->
  <rect x="62" y="63" width="155" height="2.5" rx="1.25" fill="url(#barGrad)"/>
</svg>